# ── HTTP — redirect to HTTPS + serve ACME challenge ──────────────────────────
server {
    listen 80;
    server_name dashboard.greatwallgardens.estate;

    # Let's Encrypt / Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name dashboard.greatwallgardens.estate;

    ssl_certificate     /etc/letsencrypt/live/dashboard.greatwallgardens.estate/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dashboard.greatwallgardens.estate/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers (Next.js adds X-Frame-Options etc. already)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Upload limit (for Word template, profile photos, etc.)
    client_max_body_size 20M;

    # Timeouts for long-running requests (lease doc generation)
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;

    # ── Frontend (Next.js) ───────────────────────────────────────────────────
    location / {
        proxy_pass         http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ── MPesa callbacks go directly to backend ───────────────────────────────
    # (Safaricom POSTs to these URLs from outside — must be publicly reachable)
    location /api/mpesa/ {
        proxy_pass         http://backend:8081/api/mpesa/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
