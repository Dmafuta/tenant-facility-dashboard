name: Build & Deploy Frontend

on:
  push:
    branches: [main]

env:
  REGISTRY:   ghcr.io
  IMAGE_NAME: ghcr.io/dmafuta/tenant-portal

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SERVER_SSH_KEY }}
          envs:     GHCR_TOKEN,GHCR_ACTOR
          script: |
            cd /opt/tenantportal
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_ACTOR" --password-stdin
            # Ensure docker-compose.yml has image: field for frontend so pull works
            grep -q 'ghcr.io/dmafuta/tenant-portal' docker-compose.yml || \
              sed -i 's/^  frontend:$/  frontend:\n    image: ghcr.io\/dmafuta\/tenant-portal:latest/' docker-compose.yml
            docker compose pull frontend
            docker compose up -d --no-deps frontend
            docker image prune -f
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_ACTOR: ${{ github.actor }}
